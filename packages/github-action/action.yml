name: 'Zovo Permissions Scanner'
description: 'Scan Chrome extension permissions and report changes on PRs'
author: 'Zovo'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  manifest-path:
    description: 'Path to manifest.json (default: auto-detect)'
    required: false
    default: ''
  fail-below:
    description: 'Fail the check if score drops below this threshold (0-100, default: disabled)'
    required: false
    default: '0'
  comment:
    description: 'Post a PR comment with results (default: true)'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments'
    required: false
    default: '${{ github.token }}'

outputs:
  score:
    description: 'Current permission score (0-100)'
  grade:
    description: 'Letter grade (A+ through F)'
  score-delta:
    description: 'Score change from base branch'

runs:
  using: 'node20'
  main: 'dist/index.js'
