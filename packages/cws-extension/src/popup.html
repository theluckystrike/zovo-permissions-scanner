<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zovo Extension Scanner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <span class="header-icon">\u{1F6E1}\u{FE0F}</span>
      <h1 class="header-title">Zovo Scanner</h1>
    </header>

    <div id="loading" class="state loading-state" style="display:none;">
      <div class="spinner"></div>
      <p>Scanning extension...</p>
    </div>

    <div id="not-cws" class="state not-cws-state" style="display:none;">
      <p class="muted-text">Not on the Chrome Web Store.</p>
      <p class="muted-text">Visit an extension page on the
        <a href="https://chromewebstore.google.com" target="_blank" rel="noopener">Chrome Web Store</a>
        to see its privacy grade.
      </p>
    </div>

    <div id="error" class="state error-state" style="display:none;">
      <p class="error-text">\u{26A0}\u{FE0F} Unable to scan</p>
      <p id="error-detail" class="muted-text"></p>
    </div>

    <div id="result" class="state result-state" style="display:none;">
      <div class="grade-row">
        <div id="grade-badge" class="grade-badge"></div>
        <div class="grade-info">
          <div id="grade-label" class="grade-label"></div>
          <div id="grade-score" class="grade-score"></div>
        </div>
      </div>

      <div id="summary-line" class="summary-line"></div>

      <div id="risks-list" class="risks-list"></div>

      <a id="full-report-link" class="full-report-link" href="#" target="_blank" rel="noopener">
        View full report \u{2192}
      </a>
    </div>

    <footer class="footer">
      <a href="https://scan.zovo.dev" target="_blank" rel="noopener">scan.zovo.dev</a>
      <span class="footer-sep">\u{00B7}</span>
      <a href="https://zovo.dev" target="_blank" rel="noopener">zovo.dev</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
